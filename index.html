<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citizens Health — Ortho &amp; Rehab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pt:  #1B6B4A; --pt-l: #E6F4EE;
    --ot:  #1A4F8A; --ot-l: #E6EFF8;
    --sp:  #7A3B8C; --sp-l: #F2EAF6;
    --cr:  #B83B2A; --cr-l: #FAEAE7;
    --or:  #7A5C1E; --or-l: #F5F0E6;
  }

  html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family:'DM Sans',sans-serif; }

  #slideshow { width:100vw; height:100vh; position:relative; }

  .slide {
    position:absolute; inset:0; width:100%; height:100%;
    display:flex; opacity:0; transition:opacity 0.8s ease; pointer-events:none;
  }
  .slide.active { opacity:1; pointer-events:auto; }

  .dot-bg {
    position:absolute; inset:0; pointer-events:none;
    background-image:radial-gradient(circle, rgba(255,255,255,0.15) 1.5px, transparent 1.5px);
    background-size:28px 28px;
  }

  #progress-bar {
    position:fixed; bottom:0; left:0; height:4px;
    background:rgba(255,255,255,0.45); z-index:100; transition:width linear;
  }

  .slide-tag {
    display:inline-block; padding:6px 16px; border-radius:30px;
    font-size:clamp(12px,1.1vw,16px); font-weight:600;
    letter-spacing:1.8px; text-transform:uppercase; margin-bottom:20px;
  }
  .slide-headline {
    font-family:'DM Serif Display',serif;
    font-size:clamp(28px,4.2vw,64px); line-height:1.15;
    letter-spacing:-0.5px; margin-bottom:18px;
  }
  .slide-body { font-size:clamp(16px,1.9vw,28px); line-height:1.55; font-weight:300; }
  .slide-body strong { font-weight:600; }
  .dept-name {
    display:flex; align-items:center; gap:10px; margin-top:28px;
    font-size:clamp(11px,1vw,15px); font-weight:600;
    letter-spacing:2px; text-transform:uppercase; opacity:0.6;
  }
  .dept-name::before {
    content:''; display:block; width:32px; height:2px;
    border-radius:2px; background:currentColor; opacity:0.5;
  }

  /* STAT */
  .layout-stat .stat-panel {
    width:38%; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:6%; position:relative;
  }
  .layout-stat .stat-num {
    font-family:'DM Serif Display',serif;
    font-size:clamp(56px,9vw,120px); line-height:1; letter-spacing:-3px; color:#fff;
  }
  .layout-stat .stat-unit {
    font-size:clamp(14px,1.6vw,22px); font-weight:500;
    letter-spacing:2px; text-transform:uppercase; opacity:0.75; margin-top:8px; color:#fff; text-align:center;
  }
  .layout-stat .text-panel {
    flex:1; display:flex; flex-direction:column; justify-content:center;
    padding:6% 7% 6% 5%; background:#fff; color:#1A1A1A;
  }
  .layout-stat .text-panel .slide-body { color:#3D4452; }

  /* HERO */
  .layout-hero { align-items:stretch; }
  .layout-hero .hero-inner {
    flex:1; display:flex; flex-direction:column; justify-content:center;
    padding:9% 11%; position:relative; color:#fff;
  }
  .layout-hero .slide-body { color:rgba(255,255,255,0.85); max-width:72%; }
  .layout-hero .slide-headline { max-width:78%; }
  .layout-hero .slide-tag { background:rgba(255,255,255,0.18); color:#fff; }
  .layout-hero .dept-name { color:rgba(255,255,255,0.55); }

  /* TIP */
  .layout-tip .tip-bar { width:8px; flex-shrink:0; }
  .layout-tip .tip-content {
    flex:1; display:flex; flex-direction:column; justify-content:center; padding:7% 9%;
  }
  .layout-tip .slide-body { color:#3D4452; }

  /* SPLIT */
  .layout-split .split-left {
    width:46%; display:flex; flex-direction:column;
    justify-content:center; padding:7%; color:#fff; position:relative;
  }
  .layout-split .split-right {
    flex:1; background:#fff; display:flex; flex-direction:column;
    justify-content:center; padding:7%; color:#1A1A1A;
  }
  .layout-split .split-right .slide-body { color:#3D4452; }

  /* SPOTLIGHT */
  .layout-spotlight .photo-panel {
    width:38%; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:6%; position:relative; color:#fff;
  }
  .layout-spotlight .staff-photo {
    width:clamp(100px,13vw,180px); height:clamp(100px,13vw,180px);
    border-radius:50%; object-fit:cover; border:4px solid rgba(255,255,255,0.4);
    margin-bottom:20px; background:rgba(255,255,255,0.15);
    display:flex; align-items:center; justify-content:center;
    font-size:clamp(36px,5vw,64px); font-family:'DM Serif Display',serif; color:#fff;
  }
  .layout-spotlight .staff-name {
    font-family:'DM Serif Display',serif;
    font-size:clamp(20px,2.4vw,34px); color:#fff; text-align:center; line-height:1.2;
  }
  .layout-spotlight .staff-title {
    font-size:clamp(12px,1.1vw,16px); color:rgba(255,255,255,0.75);
    text-align:center; margin-top:6px; font-weight:400;
  }
  .layout-spotlight .bio-panel {
    flex:1; background:#fff; display:flex; flex-direction:column;
    justify-content:center; padding:6% 7%; color:#1A1A1A;
  }
  .layout-spotlight .fun-fact-label {
    font-size:clamp(11px,1vw,14px); font-weight:600; letter-spacing:1.5px;
    text-transform:uppercase; margin-bottom:8px; opacity:0.5; margin-top:20px;
  }
  .layout-spotlight .fun-fact {
    font-size:clamp(15px,1.7vw,24px); line-height:1.5; font-weight:300; color:#3D4452;
  }
  .layout-spotlight .years-badge {
    display:inline-flex; align-items:center; gap:8px; margin-top:18px;
    font-size:clamp(12px,1vw,15px); font-weight:500; opacity:0.55;
  }

  /* WEATHER */
  .layout-weather { background:#0a1628; align-items:stretch; flex-direction:row; }
  .weather-left {
    width:42%; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:6%; position:relative;
    border-right:1px solid rgba(255,255,255,0.08);
  }
  .weather-icon { font-size:clamp(56px,10vw,120px); line-height:1; margin-bottom:16px; }
  .weather-temp {
    font-family:'DM Serif Display',serif;
    font-size:clamp(52px,9vw,110px); line-height:1; color:#fff; letter-spacing:-3px;
  }
  .weather-temp sup { font-size:0.4em; vertical-align:super; letter-spacing:0; opacity:0.7; }
  .weather-desc { font-size:clamp(14px,1.8vw,24px); color:rgba(255,255,255,0.7); margin-top:8px; font-weight:300; text-align:center; }
  .weather-location { font-size:clamp(11px,1vw,14px); color:rgba(255,255,255,0.4); letter-spacing:2px; text-transform:uppercase; margin-top:10px; font-weight:500; }
  .weather-right { flex:1; display:flex; flex-direction:column; justify-content:center; padding:6% 7%; }
  .weather-today { margin-bottom:24px; padding-bottom:24px; border-bottom:1px solid rgba(255,255,255,0.1); }
  .weather-label { font-size:clamp(10px,1vw,13px); font-weight:600; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.4); margin-bottom:8px; }
  .weather-hilo { font-size:clamp(18px,2.4vw,34px); color:#fff; font-weight:300; }
  .weather-hilo .hi { color:#f5a623; font-weight:500; }
  .weather-hilo .lo { color:#7eb8f7; }
  .forecast-row { display:flex; gap:0; margin-top:4px; }
  .forecast-day { flex:1; display:flex; flex-direction:column; align-items:center; padding:14px 8px; border-radius:10px; background:rgba(255,255,255,0.05); margin:0 5px; }
  .forecast-day:first-child { margin-left:0; }
  .forecast-day:last-child  { margin-right:0; }
  .fc-name { font-size:clamp(10px,1vw,13px); font-weight:600; letter-spacing:1px; text-transform:uppercase; color:rgba(255,255,255,0.5); margin-bottom:8px; }
  .fc-icon { font-size:clamp(20px,3vw,36px); margin-bottom:8px; }
  .fc-temps { font-size:clamp(12px,1.3vw,18px); color:#fff; font-weight:300; }
  .fc-temps .hi { color:#f5a623; font-weight:500; }
  .fc-temps .lo { color:#7eb8f7; }
</style>
</head>

// =====================================================================
//  DISPLAY ENGINE — no need to edit below this line
// =====================================================================

const DEPT = {
  pt: { name: 'Physical Therapy',     color: '#1B6B4A', light: '#E6F4EE' },
  ot: { name: 'Occupational Therapy', color: '#1A4F8A', light: '#E6EFF8' },
  sp: { name: 'Speech Therapy',       color: '#7A3B8C', light: '#F2EAF6' },
  cr: { name: 'Cardiac Rehab',        color: '#B83B2A', light: '#FAEAE7' },
  or: { name: 'Orthopedics',          color: '#7A5C1E', light: '#F5F0E6' },
};

let current = 0, timer = null;
const rotationMs = (CONTENT.settings.rotation_seconds || 8) * 1000;
const slides = CONTENT.slides.filter(s => s.active !== false);

function init() {
  const container = document.getElementById('slideshow');
  slides.forEach(s => container.appendChild(buildSlide(s)));
  showSlide(0);
}

function showSlide(index) {
  const allEls = document.querySelectorAll('.slide');
  allEls.forEach(el => el.classList.remove('active'));
  allEls[index].classList.add('active');
  current = index;
  animateProgress();
  clearTimeout(timer);
  timer = setTimeout(() => showSlide((current + 1) % allEls.length), rotationMs);
}

function animateProgress() {
  const bar = document.getElementById('progress-bar');
  bar.style.transition = 'none';
  bar.style.width = '0%';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    bar.style.transition = `width ${rotationMs}ms linear`;
    bar.style.width = '100%';
  }));
}

// ── Weather helpers ────────────────────────────────────────────────────────

// Colby, KS coordinates
const WEATHER_LAT = 39.3953;
const WEATHER_LON = -101.0521;

const WMO_ICON = {
  0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️',
  45:'🌫️', 48:'🌫️',
  51:'🌦️', 53:'🌦️', 55:'🌧️',
  61:'🌧️', 63:'🌧️', 65:'🌧️',
  71:'🌨️', 73:'🌨️', 75:'❄️',
  80:'🌦️', 81:'🌧️', 82:'⛈️',
  95:'⛈️', 96:'⛈️', 99:'⛈️',
};
const WMO_DESC = {
  0:'Clear skies', 1:'Mostly clear', 2:'Partly cloudy', 3:'Overcast',
  45:'Foggy', 48:'Freezing fog',
  51:'Light drizzle', 53:'Drizzle', 55:'Heavy drizzle',
  61:'Light rain', 63:'Rain', 65:'Heavy rain',
  71:'Light snow', 73:'Snow', 75:'Heavy snow',
  80:'Showers', 81:'Heavy showers', 82:'Violent showers',
  95:'Thunderstorm', 96:'Thunderstorm w/ hail', 99:'Heavy thunderstorm',
};
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

async function fetchWeather() {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${WEATHER_LAT}&longitude=${WEATHER_LON}`
      + `&current=temperature_2m,weathercode`
      + `&daily=weathercode,temperature_2m_max,temperature_2m_min`
      + `&temperature_unit=fahrenheit&wind_speed_unit=mph&forecast_days=4&timezone=America%2FChicago`;
    const res  = await fetch(url);
    const data = await res.json();
    return data;
  } catch(e) {
    return null;
  }
}

function buildWeatherSlide(data) {
  const el = document.createElement('div');
  el.className = 'slide layout-weather';
  if (!data) {
    el.innerHTML = `
      <div class="weather-left"><div class="weather-icon">☁️</div>
        <div class="weather-desc">Weather unavailable</div>
        <div class="weather-location">Colby, KS</div>
      </div>
      <div class="weather-right"><div class="weather-label">Check back soon</div></div>`;
    return el;
  }

  const cur     = data.current;
  const daily   = data.daily;
  const temp    = Math.round(cur.temperature_2m);
  const code    = cur.weathercode;
  const icon    = WMO_ICON[code] || '🌡️';
  const desc    = WMO_DESC[code] || 'Current conditions';
  const hi0     = Math.round(daily.temperature_2m_max[0]);
  const lo0     = Math.round(daily.temperature_2m_min[0]);

  // Next 3 days (indices 1, 2, 3)
  const forecast = [1,2,3].map(i => {
    const d = new Date(daily.time[i] + 'T12:00:00');
    return {
      day:  DAYS[d.getDay()],
      icon: WMO_ICON[daily.weathercode[i]] || '🌡️',
      hi:   Math.round(daily.temperature_2m_max[i]),
      lo:   Math.round(daily.temperature_2m_min[i]),
    };
  });

  el.innerHTML = `
    <div class="weather-left">
      <div class="weather-icon">${icon}</div>
      <div class="weather-temp">${temp}<sup>°F</sup></div>
      <div class="weather-desc">${desc}</div>
      <div class="weather-location">Colby, KS</div>
    </div>
    <div class="weather-right">
      <div class="weather-today">
        <div class="weather-label">Today</div>
        <div class="weather-hilo">
          <span class="hi">High ${hi0}°</span>
          &nbsp;·&nbsp;
          <span class="lo">Low ${lo0}°</span>
        </div>
      </div>
      <div class="weather-label">3-Day Forecast</div>
      <div class="forecast-row">
        ${forecast.map(f => `
          <div class="forecast-day">
            <div class="fc-name">${f.day}</div>
            <div class="fc-icon">${f.icon}</div>
            <div class="fc-temps">
              <span class="hi">${f.hi}°</span>
              <span style="opacity:0.4"> / </span>
              <span class="lo">${f.lo}°</span>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
  return el;
}

function buildSlide(s) {
  const d = DEPT[s.dept] || { name: s.dept, color: '#444', light: '#eee' };
  const el = document.createElement('div');
  el.className = 'slide layout-' + s.layout;
  if      (s.layout === 'stat')      el.innerHTML = buildStat(s, d);
  else if (s.layout === 'hero')      el.innerHTML = buildHero(s, d);
  else if (s.layout === 'tip')       el.innerHTML = buildTip(s, d);
  else if (s.layout === 'split')     el.innerHTML = buildSplit(s, d);
  else if (s.layout === 'spotlight') el.innerHTML = buildSpotlight(s, d);
  return el;
}

function buildStat(s, d) {
  return `
    <div class="stat-panel" style="background:${d.color}">
      <div class="dot-bg"></div>
      <div class="stat-num">${s.stat}</div>
      <div class="stat-unit">${s.unit}</div>
    </div>
    <div class="text-panel">
      <span class="slide-tag" style="background:${d.light};color:${d.color}">${s.tag}</span>
      <div class="slide-headline">${s.headline}</div>
      <div class="slide-body">${s.body}</div>
      <div class="dept-name" style="color:${d.color}">${d.name}</div>
    </div>`;
}

function buildHero(s, d) {
  return `
    <div class="hero-inner" style="background:${d.color}">
      <div class="dot-bg"></div>
      <span class="slide-tag">${s.tag}</span>
      <div class="slide-headline">${s.headline}</div>
      <div class="slide-body">${s.body}</div>
      <div class="dept-name">${d.name}</div>
    </div>`;
}

function buildTip(s, d) {
  return `
    <div class="tip-bar" style="background:${d.color}"></div>
    <div class="tip-content" style="background:${d.light}">
      <span class="slide-tag" style="background:rgba(255,255,255,0.6);color:${d.color}">${s.tag}</span>
      <div class="slide-headline" style="color:#1A1A1A">${s.headline}</div>
      <div class="slide-body">${s.body}</div>
      <div class="dept-name" style="color:${d.color}">${d.name}</div>
    </div>`;
}

function buildSplit(s, d) {
  return `
    <div class="split-left" style="background:${d.color}">
      <div class="dot-bg"></div>
      <span class="slide-tag" style="background:rgba(255,255,255,0.18);color:#fff">${s.tag}</span>
      <div class="slide-headline" style="color:#fff">${s.headline}</div>
    </div>
    <div class="split-right">
      <div class="slide-body">${s.body}</div>
      <div class="dept-name" style="color:${d.color}">${d.name}</div>
    </div>`;
}

function buildSpotlight(s, d) {
  const initials = (s.name || '?').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
  const photoEl = s.photo
    ? `<img class="staff-photo" src="${s.photo}" alt="${s.name}">`
    : `<div class="staff-photo">${initials}</div>`;
  const yearsLine = s.years
    ? `<div class="years-badge" style="color:${d.color}">&#9679; ${s.years} year${s.years == 1 ? '' : 's'} at Citizens Health</div>`
    : '';
  return `
    <div class="photo-panel" style="background:${d.color}">
      <div class="dot-bg"></div>
      ${photoEl}
      <div class="staff-name">${s.name || ''}</div>
      <div class="staff-title">${s.title || ''}</div>
    </div>
    <div class="bio-panel">
      <span class="slide-tag" style="background:${d.light};color:${d.color}">Meet the Team</span>
      <div class="slide-headline" style="color:#1A1A1A;font-size:clamp(22px,3vw,44px)">${s.bio || ''}</div>
      <div class="fun-fact-label" style="color:${d.color}">Fun fact</div>
      <div class="fun-fact">${s.fun_fact || ''}</div>
      ${yearsLine}
      <div class="dept-name" style="color:${d.color}">${d.name}</div>
    </div>`;
}

async function init() {
  const container = document.getElementById('slideshow');

  // Fetch live weather (Colby, KS)
  const weatherData = await fetchWeather();

  // Build all slides, inserting a weather slide every 5 content slides
  let allSlides = [];
  slides.forEach((s, i) => {
    allSlides.push(buildSlide(s));
    if ((i + 1) % 5 === 0) {
      allSlides.push(buildWeatherSlide(weatherData));
    }
  });
  // Always ensure at least one weather slide
  if (slides.length < 5) allSlides.push(buildWeatherSlide(weatherData));

  allSlides.forEach(el => container.appendChild(el));
  showSlide(0);
}

init();
</script>
</body>
</html>
